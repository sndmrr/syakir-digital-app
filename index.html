<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Syakir Digital - Sistem Manajemen Tagihan</title>
    <meta name="description" content="Sistem Manajemen Tagihan Digital" />
    <meta name="author" content="Syakir Digital" />

    <!-- Google Fonts - Poppins & Orbitron for modern colorful look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Open Graph tags with dynamic origin -->
    <meta property="og:title" content="Syakir Digital" />
    <meta property="og:description" content="Sistem Manajemen Tagihan Digital" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph-image.png" />

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@syakir_digital" />
    <meta name="twitter:image" content="/opengraph-image.png" />

    <!-- Force popup above keyboard CSS -->
    <style>
      /* Reset default body styles */
      body {
        overflow: auto !important;
        height: auto !important;
        position: static !important;
        width: auto !important;
        touch-action: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      
      /* Global fix untuk semua select dropdown */
      [data-radix-select-content] {
        position: fixed !important;
        z-index: 9999999 !important;
        background: white !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 0.375rem !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        min-width: 8rem !important;
        max-height: 15rem !important;
        overflow-y: auto !important;
      }
      
      [data-radix-select-viewport] {
        padding: 0.25rem !important;
      }
      
      [data-radix-select-item] {
        padding: 0.5rem 0.75rem !important;
        font-size: 0.875rem !important;
        color: #1f2937 !important;
        cursor: pointer !important;
        display: block !important;
        visibility: visible !important;
      }
      
      [data-radix-select-item]:hover,
      [data-radix-select-item][data-state="checked"] {
        background-color: #eff6ff !important;
      }
      
      /* Body scroll lock untuk popup */
      body.modal-open {
        overflow: hidden !important;
        height: 100vh !important;
        position: fixed !important;
        width: 100% !important;
        touch-action: none !important;
        -webkit-overflow-scrolling: touch !important;
      }
      
      /* Force popup di atas keyboard untuk semua browser */
      @supports (-webkit-touch-callout: none) {
        /* iOS Safari */
        [data-radix-dialog-content] {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          right: 0 !important;
          bottom: auto !important;
          margin: 0 !important;
          max-height: 100dvh !important;
          height: auto !important;
          width: 100vw !important;
          z-index: 99999 !important;
          border-radius: 0 !important;
        }
      }
      
      @supports (-moz-appearance: none) {
        /* Firefox Mobile */
        [data-radix-dialog-content] {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          right: 0 !important;
          bottom: auto !important;
          margin: 0 !important;
          max-height: 100dvh !important;
          height: auto !important;
          width: 100vw !important;
          z-index: 99999 !important;
          border-radius: 0 !important;
        }
      }
      
      /* Chrome Mobile dan Android */
      @media (max-width: 768px) {
        [data-radix-dialog-content] {
          position: fixed !important;
          inset: 0 !important;
          margin: 0 !important;
          height: 100dvh !important;
          width: 100vw !important;
          z-index: 99999 !important;
          border-radius: 0 !important;
          overflow-y: auto !important;
          overflow-x: hidden !important;
        }
        
        /* Overlay gelap yang lebih kuat */
        [data-radix-dialog-overlay] {
          background: rgba(0, 0, 0, 0.5) !important;
          backdrop-filter: blur(2px) !important;
        }
        
        /* Fix Select Dropdown di dalam Dialog */
        [data-radix-select-content] {
          position: fixed !important;
          z-index: 9999999 !important;
          background: white !important;
          border: 1px solid #e5e7eb !important;
          border-radius: 0.375rem !important;
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
          display: block !important;
          visibility: visible !important;
          opacity: 1 !important;
        }
        
        [data-radix-select-viewport] {
          padding: 0.25rem !important;
        }
        
        [data-radix-select-item] {
          padding: 0.5rem 0.75rem !important;
          font-size: 0.875rem !important;
          color: #1f2937 !important;
          cursor: pointer !important;
          display: block !important;
          visibility: visible !important;
        }
        
        [data-radix-select-item]:hover,
        [data-radix-select-item][data-state="checked"] {
          background-color: #eff6ff !important;
        }
      }
      
      /* Desktop behavior tetap normal */
      @media (min-width: 769px) {
        [data-radix-dialog-content] {
          position: fixed !important;
          top: 50% !important;
          left: 50% !important;
          transform: translate(-50%, -50%) !important;
          margin: 0 !important;
          height: auto !important;
          width: auto !important;
          max-width: 512px !important;
          max-height: 90vh !important;
          border-radius: 0.75rem !important;
          z-index: 50 !important;
        }
        
        /* Fix Select Dropdown di Desktop Dialog */
        [data-radix-select-content] {
          z-index: 9999999 !important;
          background: white !important;
          border: 1px solid #e5e7eb !important;
          border-radius: 0.375rem !important;
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
          display: block !important;
          visibility: visible !important;
          opacity: 1 !important;
        }
        
        [data-radix-select-item] {
          padding: 0.5rem 0.75rem !important;
          font-size: 0.875rem !important;
          color: #1f2937 !important;
          cursor: pointer !important;
          display: block !important;
          visibility: visible !important;
        }
        
        [data-radix-select-item]:hover,
        [data-radix-select-item][data-state="checked"] {
          background-color: #eff6ff !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
